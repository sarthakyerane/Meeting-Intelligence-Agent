
services:
  mysql:
    image: mysql:8.0
    container_name: meeting_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - meeting_net

  chromadb:
    image: chromadb/chroma:latest
    container_name: meeting_chroma
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - meeting_net

  redis:
    image: redis:7-alpine
    container_name: meeting_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - meeting_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: meeting_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - MYSQL_HOST=mysql
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - REDIS_URL=redis://redis:6379
      - HF_TOKEN=${HF_TOKEN}
    volumes:
      - ./backend:/app
      - whisper_cache:/root/.cache/huggingface
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    networks:
      - meeting_net

  mcp_server:
    build:
      context: ./mcp_server
      dockerfile: Dockerfile
    container_name: meeting_mcp
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - meeting_net
    command: tail -f /dev/null

volumes:
  mysql_data:
  chroma_data:
  redis_data:
  whisper_cache:

networks:
  meeting_net:
    driver: bridge
